name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Install Capacitor
        run: npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/network@latest @capacitor/app@latest

      - name: Add Capacitor Android
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add App Icons and Splash Screen
        run: |
          pip install Pillow --break-system-packages
          python3 -c "
          from PIL import Image
          import os

          img = Image.open('public/logo.png').convert('RGBA')

          def make_padded_icon(source, size, padding_pct, bg=(255, 255, 255, 255)):
              # Places the source logo centered on a full-size canvas with
              # transparent-safe padding, so Android's launcher mask (circle,
              # squircle, etc.) doesn't crop into the actual artwork.
              canvas = Image.new('RGBA', (size, size), bg)
              inner = int(size * (1 - padding_pct * 2))
              resized = source.resize((inner, inner), Image.LANCZOS)
              x = (size - inner) // 2
              y = (size - inner) // 2
              canvas.paste(resized, (x, y), mask=resized.split()[3])
              return canvas

          # Legacy/round icons: moderate padding (~15%) — these are shown
          # mostly as-is on older launchers, just enough breathing room.
          legacy_configs = [
            ('android/app/src/main/res/mipmap-mdpi/ic_launcher.png', 48),
            ('android/app/src/main/res/mipmap-hdpi/ic_launcher.png', 72),
            ('android/app/src/main/res/mipmap-xhdpi/ic_launcher.png', 96),
            ('android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png', 144),
            ('android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png', 192),
            ('android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png', 48),
            ('android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png', 72),
            ('android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png', 96),
            ('android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png', 144),
            ('android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png', 192),
          ]
          for path, size in legacy_configs:
            os.makedirs(os.path.dirname(path), exist_ok=True)
            icon = make_padded_icon(img, size, padding_pct=0.15)
            icon.convert('RGB').save(path)
            print(f'Created {path}')

          # Adaptive icon foreground layers: Android's adaptive icon spec
          # only guarantees the center ~66% (a 'safe zone') survives every
          # possible mask shape (circle, squircle, rounded square, etc).
          # Content outside that zone WILL get clipped on some launchers —
          # this is the actual cause of the 'zoomed in' look. ~30% padding
          # keeps the logo safely inside that zone on every shape.
          foreground_configs = [
            ('android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png', 48),
            ('android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png', 72),
            ('android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png', 96),
            ('android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png', 144),
            ('android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png', 192),
          ]
          for path, size in foreground_configs:
            os.makedirs(os.path.dirname(path), exist_ok=True)
            icon = make_padded_icon(img, size, padding_pct=0.30)
            icon.convert('RGB').save(path)
            print(f'Created {path}')

          # Splash screen logo — centered on teal background (unchanged)
          splash_sizes = [
            ('android/app/src/main/res/drawable/splash.png', 1080, 1920),
            ('android/app/src/main/res/drawable-land/splash.png', 1920, 1080),
          ]
          logo = Image.open('public/logo.png').convert('RGBA')
          for path, w, h in splash_sizes:
            os.makedirs(os.path.dirname(path), exist_ok=True)
            splash = Image.new('RGBA', (w, h), (13, 148, 136, 255))  # teal #0d9488
            logo_size = min(w, h) // 3
            logo_resized = logo.resize((logo_size, logo_size), Image.LANCZOS)
            x = (w - logo_size) // 2
            y = (h - logo_size) // 2
            splash.paste(logo_resized, (x, y), mask=logo_resized.split()[3])
            splash.convert('RGB').save(path)
            print(f'Created splash {path}')
          "

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        run: |
          cd android
          sed -i 's/gradle-8.2.1-all/gradle-8.7-all/g' gradle/wrapper/gradle-wrapper.properties
          ./gradlew --no-daemon assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dukan360-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
