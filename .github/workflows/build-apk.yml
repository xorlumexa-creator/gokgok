name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Install Capacitor
        run: npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/preferences@latest
      - name: Add Capacitor Android
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android
        - name: Add App Icon
        run: |
          npm install -g sharp-cli
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          npx sharp-cli --input public/logo.png --output android/app/src/main/res/mipmap-mdpi/ic_launcher.png resize 48 48
          npx sharp-cli --input public/logo.png --output android/app/src/main/res/mipmap-hdpi/ic_launcher.png resize 72 72
          npx sharp-cli --input public/logo.png --output android/app/src/main/res/mipmap-xhdpi/ic_launcher.png resize 96 96
          npx sharp-cli --input public/logo.png --output android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png resize 144 144
          npx sharp-cli --input public/logo.png --output android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png resize 192 192
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        run: |
          cd android
          sed -i 's/gradle-8.2.1-all/gradle-8.7-all/g' gradle/wrapper/gradle-wrapper.properties
          ./gradlew --no-daemon assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dukan360-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
