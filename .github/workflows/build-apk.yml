name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Install Capacitor
        run: npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Add Capacitor Android
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add App Icon
        run: |
          pip install Pillow --break-system-packages
          python3 -c "
          from PIL import Image
          import os
          img = Image.open('public/logo.png')
          configs = [
            ('android/app/src/main/res/mipmap-mdpi/ic_launcher.png', 48),
            ('android/app/src/main/res/mipmap-hdpi/ic_launcher.png', 72),
            ('android/app/src/main/res/mipmap-xhdpi/ic_launcher.png', 96),
            ('android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png', 144),
            ('android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png', 192),
          ]
          for path, size in configs:
            os.makedirs(os.path.dirname(path), exist_ok=True)
            img.resize((size, size), Image.LANCZOS).save(path)
            print(f'Created {path}')
          "

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        run: |
          cd android
          sed -i 's/gradle-8.2.1-all/gradle-8.7-all/g' gradle/wrapper/gradle-wrapper.properties
          ./gradlew --no-daemon assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dukan360-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
