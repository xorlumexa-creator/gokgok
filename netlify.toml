[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/sw.js"
    [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
    [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
